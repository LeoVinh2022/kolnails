<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KOL Nails">
<meta name="theme-color" content="#111111">
<title>KOL Nails</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { touch-action: manipulation; }

:root {
  --bg:         #111111;
  --surface:    #1c1c1c;
  --surface2:   #252525;
  --border:     #303030;
  --text:       #f2f2f2;
  --sub:        #999999;
  --gold:       #e0b46a;
  --gold-dim:   #2e2108;
  --green:      #52c48a;
  --green-dim:  #0c2518;
  --red:        #e06060;
  --safe-top:   env(safe-area-inset-top);
  --safe-bot:   env(safe-area-inset-bottom);
  --font:       'Nunito', sans-serif;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font);
  -webkit-user-select: none; user-select: none;
}

.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease;
}
.screen.active { opacity: 1; pointer-events: all; }

.safe-top { height: calc(var(--safe-top) + 14px); min-height: 54px; flex-shrink: 0; }
.safe-bot { height: calc(var(--safe-bot) + 8px); min-height: 16px; flex-shrink: 0; }

/* HEADER & POS */
.pos-header { flex-shrink: 0; padding: 0 22px 10px; }
.pos-brand {
  font-size: 13px; font-weight: 800; letter-spacing: 3px;
  text-transform: uppercase; color: var(--gold); margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.cart-total-amt {
  font-size: 44px; font-weight: 300; line-height: 1;
  font-family: 'Nunito Sans', sans-serif; letter-spacing: -1px;
}

/* DANH SÁCH ĐÃ CHỌN */
.cart-wrap {
  flex: 1; overflow-y: auto; padding: 0 22px;
  border-bottom: 1px solid var(--border);
}
.cart-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.cart-item-name { flex: 1; font-size: 16px; font-weight: 700; }
.cart-item-price { font-size: 16px; font-weight: 800; color: var(--gold); }
.cart-item-del { color: var(--sub); background: none; border: none; font-size: 18px; padding: 5px; }

/* BẢNG DỊCH VỤ */
.svc-area { flex-shrink: 0; padding: 16px 22px; background: var(--bg); }
.svc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.svc-btn {
  border-radius: 14px; padding: 14px 4px;
  background: var(--surface); border: 2px solid var(--border);
  text-align: center; font-weight: 700; font-size: 14px; color: var(--sub);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.svc-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.svc-ico { font-size: 22px; }

/* NÚT TIẾP TỤC - CỐ ĐỊNH PHÍA DƯỚI */
.pos-footer { flex-shrink: 0; padding: 10px 22px; }
#svc-go-btn {
  width: 100%; padding: 18px; border-radius: 16px;
  background: var(--surface2); border: none;
  color: var(--sub); font-size: 17px; font-weight: 900;
  opacity: 0.3; pointer-events: none; transition: all 0.2s;
}
#svc-go-btn.ready {
  background: var(--gold); color: #111; opacity: 1; pointer-events: all;
  box-shadow: 0 4px 15px rgba(224,180,106,0.3);
}

/* KEYPAD */
#keypad-area {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bg); display: none; flex-direction: column;
  border-top: 1px solid var(--border); z-index: 10;
}
.keypad {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border);
}
.key {
  background: var(--surface); height: 65px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-family: 'Nunito Sans', sans-serif;
}
.key:active { background: var(--surface2); }

/* CÁC MÀN HÌNH KHÁC GIỮ NGUYÊN STYLE CŨ */
#screen-confirm { background: var(--bg); }
.btn-charge { width: 100%; padding: 18px; border-radius: 16px; background: var(--gold); color: #111; font-weight: 900; border: none; margin-top: 20px; }
</style>
</head>
<body>

<div id="screen-pos" class="screen active">
  <div class="safe-top"></div>
  <div class="pos-header">
    <div class="pos-brand">✦ KOL Nails <span>☰</span></div>
    <div class="cart-total-amt">₫ <span id="cart-total">0</span></div>
  </div>

  <div class="cart-wrap" id="cart-wrap">
    <div style="text-align:center; padding:40px; color:var(--sub); font-size:14px">Chưa có dịch vụ nào được chọn</div>
  </div>

  <div class="svc-area" id="svc-area">
    <div class="svc-grid" id="svc-grid"></div>
  </div>

  <div class="pos-footer">
    <button id="svc-go-btn" onclick="goConfirm()">Tiếp tục →</button>
  </div>

  <div id="keypad-area">
    <div style="display:flex; justify-content:space-between; padding:15px 22px; font-weight:800">
      <span id="kp-label">Nhập giá</span>
      <span onclick="confirmPrice()" style="color:var(--gold)">Xong ✓</span>
    </div>
    <div class="keypad">
      <div class="key" onclick="tap('7')">7</div><div class="key" onclick="tap('8')">8</div><div class="key" onclick="tap('9')">9</div>
      <div class="key" onclick="tap('4')">4</div><div class="key" onclick="tap('5')">5</div><div class="key" onclick="tap('6')">6</div>
      <div class="key" onclick="tap('1')">1</div><div class="key" onclick="tap('2')">2</div><div class="key" onclick="tap('3')">3</div>
      <div class="key" onclick="tap('000')" style="font-size:16px">000</div><div class="key" onclick="tap('0')">0</div><div class="key" onclick="tap('del')">⌫</div>
    </div>
  </div>
  <div class="safe-bot"></div>
</div>

<div id="screen-confirm" class="screen">
  <div class="safe-top"></div>
  <div style="padding:0 22px">
    <button onclick="go('screen-pos')" style="background:none; border:none; color:var(--sub); font-size:18px">← Quay lại</button>
    <h2 style="margin:15px 0 5px">Xác nhận đơn</h2>
    <div id="conf-list" style="color:var(--sub); margin-bottom:20px"></div>
    <div style="font-size:32px; font-weight:800; color:var(--gold); margin-bottom:30px">₫ <span id="conf-total">0</span></div>
    
    <p style="font-size:12px; color:var(--sub); margin-bottom:8px">NHÂN VIÊN</p>
    <div id="staff-list" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px"></div>
    
    <button class="btn-charge" id="btn-save" onclick="doSave()" disabled>Lưu Giao Dịch</button>
  </div>
  <div class="safe-bot"></div>
</div>

<script>
let cart = [];
let raw = '';
let editingIdx = -1;
let selectedStaff = '';
const SCRIPT_URL = 'URL_CỦA_BẠN_Ở_ĐÂY';
const SERVICES = [
  { ico: '💅', label: 'Sơn tay' },
  { ico: '🦶', label: 'Sơn chân' },
  { ico: '👁', label: 'Nối mi' },
  { ico: '🚿', label: 'Gội đầu' },
  { ico: '✂️', label: 'Cắt tóc' },
  { ico: '💸', label: 'Tiền Tip' }
];
const STAFFS = ['Duyên', 'Thy', 'Trân', 'Ngọc', 'Thuỳ'];

function init() {
  renderSvcs();
}

function renderSvcs() {
  const grid = document.getElementById('svc-grid');
  grid.innerHTML = SERVICES.map(s => {
    const active = cart.some(c => c.label === s.label);
    return `<div class="svc-btn ${active?'active':''}" onclick="clickSvc('${s.label}', '${s.ico}')">
      <span class="svc-ico">${s.ico}</span>${s.label}
    </div>`;
  }).join('');
}

function clickSvc(label, ico) {
  const idx = cart.findIndex(c => c.label === label);
  if (idx > -1) {
    openKeypad(idx);
  } else {
    cart.push({ label, ico, price: 0 });
    openKeypad(cart.length - 1);
  }
}

function openKeypad(idx) {
  editingIdx = idx;
  raw = cart[idx].price > 0 ? cart[idx].price.toString() : '';
  document.getElementById('kp-label').innerText = cart[idx].label;
  document.getElementById('keypad-area').style.display = 'flex';
}

function tap(k) {
  if (k === 'del') raw = raw.slice(0, -1);
  else if (k === '000') raw += '000';
  else raw += k;
  
  const val = parseInt(raw || 0);
  document.getElementById('kp-label').innerText = cart[editingIdx].label + ': ' + val.toLocaleString() + 'đ';
}

function confirmPrice() {
  const val = parseInt(raw || 0);
  if (val <= 0) {
    cart.splice(editingIdx, 1);
  } else {
    cart[editingIdx].price = val;
  }
  document.getElementById('keypad-area').style.display = 'none';
  renderCart();
  renderSvcs();
  checkReady();
}

function renderCart() {
  const wrap = document.getElementById('cart-wrap');
  if (cart.length === 0) {
    wrap.innerHTML = `<div style="text-align:center; padding:40px; color:var(--sub); font-size:14px">Chưa có dịch vụ nào được chọn</div>`;
    document.getElementById('cart-total').innerText = '0';
    return;
  }
  
  let total = 0;
  wrap.innerHTML = cart.map((c, i) => {
    total += c.price;
    return `<div class="cart-item">
      <span>${c.ico}</span>
      <span class="cart-item-name">${c.label}</span>
      <span class="cart-item-price" onclick="openKeypad(${i})">${c.price.toLocaleString()}đ</span>
      <button class="cart-item-del" onclick="remove(${i})">✕</button>
    </div>`;
  }).join('');
  document.getElementById('cart-total').innerText = total.toLocaleString();
}

function remove(i) {
  cart.splice(i, 1);
  renderCart();
  renderSvcs();
  checkReady();
}

function checkReady() {
  const btn = document.getElementById('svc-go-btn');
  const isReady = cart.length > 0 && cart.every(c => c.price > 0);
  if (isReady) btn.classList.add('ready');
  else btn.classList.remove('ready');
}

function goConfirm() {
  document.getElementById('conf-list').innerHTML = cart.map(c => `${c.ico} ${c.label}`).join(', ');
  document.getElementById('conf-total').innerText = document.getElementById('cart-total').innerText;
  
  const sList = document.getElementById('staff-list');
  sList.innerHTML = STAFFS.map(s => `
    <div class="svc-btn ${selectedStaff===s?'active':''}" onclick="selectStaff('${s}')">${s}</div>
  `).join('');
  
  go('screen-confirm');
}

function selectStaff(s) {
  selectedStaff = s;
  goConfirm();
  document.getElementById('btn-save').disabled = false;
}

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function doSave() {
  const btn = document.getElementById('btn-save');
  btn.innerText = 'Đang lưu...';
  btn.disabled = true;
  
  // Logic fetch tới Google Sheets của bạn ở đây...
  setTimeout(() => {
    alert('Đã lưu thành công!');
    location.reload();
  }, 1500);
}

init();
</script>
</body>
</html>
