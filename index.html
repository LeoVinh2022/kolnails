<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>KOL Nails</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Nunito+Sans:wght@300;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { touch-action: manipulation; }
:root {
  --bg: #111111; --surface: #1c1c1c; --surface2: #252525;
  --border: #303030; --text: #f2f2f2; --sub: #999999;
  --gold: #e0b46a; --gold-dim: #2e2108; --red: #e06060;
  --safe-top: env(safe-area-inset-top); --safe-bot: env(safe-area-inset-bottom);
}
body {
  height: 100vh; background: var(--bg); color: var(--text);
  font-family: 'Nunito', sans-serif; overflow: hidden; display: flex; flex-direction: column;
}

.screen { position: fixed; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: 0.2s; }
.screen.active { opacity: 1; pointer-events: all; }

/* Layout POS */
.pos-container { display: flex; flex-direction: column; height: 100%; }
.header { padding: calc(var(--safe-top) + 15px) 22px 10px; flex-shrink: 0; }
.total-val { font-family: 'Nunito Sans'; font-size: 48px; font-weight: 800; color: var(--gold); }

/* Danh sách món đã chọn - Tự co giãn */
.cart-area { flex: 1; overflow-y: auto; padding: 0 22px; margin-bottom: 10px; }
.cart-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }

/* Khu vực dịch vụ & Nút bấm - Cố định phía dưới */
.bottom-controls { background: var(--surface); border-top: 1px solid var(--border); padding: 15px 22px calc(var(--safe-bot) + 15px); flex-shrink: 0; }
.svc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
.svc-btn { 
  background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 12px 5px;
  text-align: center; font-size: 13px; font-weight: 700; color: var(--sub);
  display: flex; flex-direction: column; gap: 5px;
}
.svc-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.svc-empty { border: 2px dashed var(--border); background: transparent; } /* Ô trống */

/* Nút Tiếp tục */
.btn-next {
  width: 100%; padding: 18px; border-radius: 15px; border: none;
  background: var(--surface2); color: var(--sub); font-size: 17px; font-weight: 900;
  opacity: 0.4; pointer-events: none; transition: 0.3s;
}
.btn-next.ready { background: var(--gold); color: #111; opacity: 1; pointer-events: all; }

/* Keypad */
#keypad-modal { 
  position: absolute; bottom: 0; left: 0; right: 0; background: var(--bg); 
  display: none; flex-direction: column; border-top: 2px solid var(--gold); z-index: 100;
}
.keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
.key { background: var(--surface); height: 70px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-family: 'Nunito Sans'; }
.key:active { background: var(--surface2); }
</style>
</head>
<body>

<div id="screen-pos" class="screen active">
  <div class="pos-container">
    <div class="header">
      <p style="font-size:12px; font-weight:800; color:var(--sub); letter-spacing:2px">KOL NAILS TỔNG</p>
      <div class="total-val">₫ <span id="txt-total">0</span></div>
    </div>

    <div class="cart-area" id="cart-list">
      <p style="text-align:center; color:var(--sub); margin-top:20px; font-size:14px">Chưa có dịch vụ nào...</p>
    </div>

    <div class="bottom-controls">
      <div class="svc-grid" id="svc-grid"></div>
      <button class="btn-next" id="btn-next" onclick="goConfirm()">TIẾP THEO →</button>
    </div>
  </div>

  <div id="keypad-modal">
    <div style="padding:15px 22px; display:flex; justify-content:space-between; align-items:center; background:var(--surface2)">
      <span id="kp-title" style="font-weight:800; color:var(--gold)">Dịch vụ</span>
      <button onclick="confirmPrice()" style="background:var(--gold); border:none; padding:8px 20px; border-radius:10px; font-weight:900">XONG ✓</button>
    </div>
    <div class="keypad">
      <div class="key" onclick="tap('7')">7</div><div class="key" onclick="tap('8')">8</div><div class="key" onclick="tap('9')">9</div>
      <div class="key" onclick="tap('4')">4</div><div class="key" onclick="tap('5')">5</div><div class="key" onclick="tap('6')">6</div>
      <div class="key" onclick="tap('1')">1</div><div class="key" onclick="tap('2')">2</div><div class="key" onclick="tap('3')">3</div>
      <div class="key" onclick="tap('000')" style="font-size:16px">000</div><div class="key" onclick="tap('0')">0</div><div class="key" onclick="tap('del')">⌫</div>
    </div>
  </div>
</div>

<div id="screen-confirm" class="screen" style="padding: 22px; background:var(--bg)">
    <h2 style="margin-top:40px">Xác nhận đơn</h2>
    <div id="final-detail" style="margin:20px 0; color:var(--sub)"></div>
    <button onclick="location.reload()" style="width:100%; padding:15px; border-radius:12px; background:var(--gold); border:none; font-weight:900">LƯU & HOÀN TẤT</button>
    <button onclick="go('screen-pos')" style="width:100%; background:none; border:none; color:var(--sub); margin-top:20px">Quay lại sửa</button>
</div>

<script>
let cart = [];
let raw = '';
let editIdx = -1;

// Danh sách 5 dịch vụ theo ý bạn
const SERVICES = [
  { ico: '💅', label: 'Sơn tay' },
  { ico: '🦶', label: 'Sơn chân' },
  { ico: '👁', label: 'Nối mi' },
  { ico: '🚿', label: 'Gội đầu' },
  { ico: '💸', label: 'Tiền Tip' }
];

function init() {
  const grid = document.getElementById('svc-grid');
  // Render 5 dịch vụ
  let html = SERVICES.map(s => `
    <div class="svc-btn" id="btn-${s.label}" onclick="addSvc('${s.label}', '${s.ico}')">
      <span style="font-size:20px">${s.ico}</span>
      <span>${s.label}</span>
    </div>
  `).join('');
  
  // Thêm ô thứ 6 trống để giữ form lưới đẹp
  html += `<div class="svc-btn svc-empty"></div>`;
  
  grid.innerHTML = html;
}

function addSvc(label, ico) {
  let idx = cart.findIndex(c => c.label === label);
  if (idx === -1) {
    cart.push({ label, ico, price: 0 });
    idx = cart.length - 1;
  }
  openKeypad(idx);
}

function openKeypad(idx) {
  editIdx = idx;
  raw = cart[idx].price > 0 ? cart[idx].price.toString() : '';
  document.getElementById('kp-title').innerText = cart[idx].label + (raw ? `: ${parseInt(raw).toLocaleString()}đ` : '');
  document.getElementById('keypad-modal').style.display = 'flex';
}

function tap(k) {
  if (k === 'del') raw = raw.slice(0, -1);
  else if (k === '000') raw += (raw ? '000' : '');
  else if (raw.length < 9) raw += k;
  
  const displayVal = raw ? parseInt(raw).toLocaleString() : '0';
  document.getElementById('kp-title').innerText = cart[editIdx].label + `: ${displayVal}đ`;
}

function confirmPrice() {
  const val = parseInt(raw || 0);
  if (val <= 0) {
    cart.splice(editIdx, 1);
  } else {
    cart[editIdx].price = val;
  }
  document.getElementById('keypad-modal').style.display = 'none';
  updateUI();
}

function updateUI() {
  const list = document.getElementById('cart-list');
  const btnNext = document.getElementById('btn-next');
  let total = 0;

  if (cart.length === 0) {
    list.innerHTML = `<p style="text-align:center; color:var(--sub); margin-top:20px; font-size:14px">Chưa có dịch vụ nào...</p>`;
  } else {
    list.innerHTML = cart.map((c, i) => {
      total += c.price;
      return `
        <div class="cart-item">
          <div><span style="margin-right:8px">${c.ico}</span><b>${c.label}</b></div>
          <div style="color:var(--gold); font-weight:800" onclick="openKeypad(${i})">${c.price.toLocaleString()}đ</div>
        </div>
      `;
    }).join('');
  }

  document.getElementById('txt-total').innerText = total.toLocaleString();
  
  // Highlight nút dịch vụ đã chọn
  document.querySelectorAll('.svc-btn').forEach(b => b.classList.remove('active'));
  cart.forEach(c => {
    const b = document.getElementById(`btn-${c.label}`);
    if (b) b.classList.add('active');
  });

  // Điều kiện nút TIẾP THEO: Có dịch vụ và tất cả đã có giá
  const ready = cart.length > 0 && cart.every(c => c.price > 0);
  if (ready) btnNext.classList.add('ready');
  else btnNext.classList.remove('ready');
}

function goConfirm() {
  document.getElementById('final-detail').innerHTML = cart.map(c => `<p>${c.label}: ${c.price.toLocaleString()}đ</p>`).join('');
  go('screen-confirm');
}

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

init();
</script>
</body>
</html>
